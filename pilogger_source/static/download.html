<!DOCTYPE html>
<html>
<title>PiLogger Download</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel=preload href="/static/w3_pilo.css" as="style"/>
<link rel=preload href="/static/iconset.png" as="image"/>
<link href="/static/favicon.ico" rel="shortcut icon" type="image/vnd.microsoft.icon"/>
<link href="/static/w3_pilo.css" rel="stylesheet"/>

<body class="w3-border-blue-grey">
	<!-- Top container -->
	<div class="w3-bar w3-top w3-indigo w3-large" style="z-index:4">
		<button class="w3-bar-item w3-button w3-hide-large w3-hover-none w3-hover-text-light-grey" onclick="sb_open();">
			<a class="Icon_Menu_wh" style="height:26px;width:26px"></a> Menu</button>
		<span class="w3-bar-item">PiLogger</span>
		<span class="w3-bar-item w3-right"><i class="Icon_Logo" class="w3-margin-right" style="height:26px;width:33px"></i></span>
	</div>
	<!-- Sidebar/menu -->
	<nav class="w3-sidebar w3-collapse w3-pale-blue w3-animate-left" style="z-index:3;width:180px;" id="mySidebar">
		<div class="w3-container">
			<h5>Menu</h5>
		</div>
		<div class="w3-bar-block">
			<a href="#" class="w3-bar-item w3-button w3-padding-16 w3-hide-large w3-dark-grey w3-hover-black" onclick="sb_close()" title="close menu"><i class="Icon_Close_wh" style="height:26px;width:26px"></i> Close Menu</a>
			<a href="/" class="w3-bar-item w3-button w3-padding"><i class="Icon_Live_bl" style="height:26px;width:32px"></i> Live Werte</a>
			<a href="/static/livechart.html" class="w3-bar-item w3-button w3-padding"><i class="Icon_ChartL_bl" style="height:26px;width:32px"></i> Live Kurve</a>
			<a href="/static/diagramme.html" class="w3-bar-item w3-button w3-padding"><i class="Icon_Chart_bl" style="height:26px;width:32px"></i> Diagramme</a>
			<a href="/static/einstell1.html" class="w3-bar-item w3-button w3-padding"><i class="Icon_Einstell_bl" style="height:26px;width:32px"></i> Einstellungen 1</a>
			<a href="/static/einstell2.html" class="w3-bar-item w3-button w3-padding"><i class="Icon_Wrench_bl" style="height:26px;width:32px"></i> Einstellungen 2</a>
			<a href="/static/kalibration.html" class="w3-bar-item w3-button w3-padding"><i class="Icon_Waage_bl" style="height:26px;width:32px"></i> Kalibration</a>
			<a href="#" class="w3-bar-item w3-button w3-padding w3-blue"><i class="Icon_Download_bl" style="height:26px;width:32px"></i> Download</a>
		</div>
	</nav>
	<!-- Overlay effect when opening sidebar on small screens -->
	<div class="w3-overlay w3-hide-large w3-animate-opacity" onclick="sb_close()" style="cursor:pointer" title="close side menu" id="myOverlay"></div>
	<!-- !PAGE CONTENT! -->
	<div class="w3-main" style="margin-left:185px;margin-top:45px;">
		<div class="w3-container w3-light-grey">
			<h4>Download</h4>
		</div>
		<div class="w3-panel">
			<span id="filelist"></span>
		</div>
		<div class="w3-panel">
			<button class="pL-button" onclick="window.location.href = '/download/logdata.csv';">aktuelle Daten-Datei herunterladen</button>
		</div>
		<div id="confmod" class="w3-modal">
			<div class="w3-modal-content w3-center w3-padding-24 w3-round-large">
				<h3><span>Rückfrage</span></h3>
				<h4><span id="conftext"></span></h4>
				<div class="w3-panel">
					<button id="conf_yes" class="pL-button w3-red w3-padding">Löschen</button>
					<span style="color:#fff">---------</span>
					<button id="conf_no" class="pL-button w3-orange w3-padding">Abbrechen</button>
				</div>
			</div>
		</div>
	</div>
	<!-- End page content -->
	<script>
	/**
	* @license
	* Copyright 2018, 2024 G.Weiß-Engel (info@pilogger.de)
	* MIT-licensed (http://opensource.org/licenses/MIT)
	*/

	var mySidebar = document.getElementById("mySidebar");
	var overlayBg = document.getElementById("myOverlay");
	function sb_open() {
		if (mySidebar.style.display === 'block') {
			mySidebar.style.display = 'none';
			overlayBg.style.display = "none";
		} else {
			mySidebar.style.display = 'block';
			overlayBg.style.display = "block";
		}
	}
	function sb_close() {
		mySidebar.style.display = "none";
		overlayBg.style.display = "none";
	}

	async function modal_confirm(frage) {
		var confmod = document.getElementById("confmod");
		var btn_yes = document.getElementById("conf_yes");
		var btn_no = document.getElementById("conf_no");
		document.getElementById("conftext").innerHTML = frage;
		confmod.style.display = "block";
		let auswahl = new Promise((resolve, reject) => {
			btn_no.onclick = function() {
				confmod.style.display = "none";
				resolve(0);
			};
			btn_yes.onclick = function() {
				confmod.style.display = "none";
				resolve(1);
			};
		});
		let ergebnis = await auswahl;
		return ergebnis;
	}

	async function req_delete(logfile,listid) {
		let antw = await modal_confirm('Datei "'+logfile+'"\nendgültig löschen ?');
		if (antw ==1) {
			var butnum = "d" + listid;
			var xhr = new XMLHttpRequest();
			xhr.open("GET","/reqdelete/" + logfile,true);
			xhr.onreadystatechange = function() {
				if (this.readyState == 4) {
					var element = document.getElementById(butnum);
					if (this.responseText == "ok") {
						element.classList.add("success");
						setTimeout(function () {element.classList.remove("success");get_file_list();},2000);
					}else{
						console.error(xhr.statusText);
						console.log("Fehler @ Req_Delete");
						element.classList.add("fail");
						setTimeout(function () {element.classList.remove("fail")},2000);
					}
				}
			};
			xhr.send();
		};
	}

	function get_file_list() {
		var xhr = new XMLHttpRequest();
		var icon_dl = '<i class="Icon_Download_bl" style="height:22px;width:27px"></i>';
		var icon_ch = '<i class="Icon_Eye_bl" style="height:22px;width:27px"></i>';
		var icon_rm = '<i class="Icon_Close_bl" style="height:22px;width:27px"></i>';
		var idnum = 0;
		xhr.open("GET","/listdatafiles/", true);
		xhr.onreadystatechange = function () {
			if (xhr.readyState === 4) {
				if (xhr.status === 200) {
					var myArr = JSON.parse(this.responseText);
					var txt = "<table border='1'>"
					for (x in myArr) {
						idnum += 1;
						dispname = '&ensp;' + myArr[x] + '&ensp;';
						txt += '<tr><td>' + dispname + '</td><td class="w3-bar-item pLm-button" onclick="window.location.href=' + "'/download/" + myArr[x] + "'" + '">' + icon_dl;
						txt += '</td><td class="w3-bar-item pLm-button w3-yellow" onclick="javascript:location.href=' + "'/static/diagramme.html?data=" + myArr[x] + "'" + '">' + icon_ch;
						txt += '</td><td class="w3-bar-item pLm-button w3-red" id="d' + idnum + '" onclick="req_delete(' + "'" + myArr[x] + "'," + idnum + ')" >' + icon_rm + '</td></tr>';
					}
					txt += "</table>";
					document.getElementById("filelist").innerHTML = txt;
				} else {
					console.error(xhr.statusText);
					console.log("Error processing get_file_list");
				}
			}
		};
		xhr.send();
	}

	window.onload = function() {
		get_file_list();
	}

	</script>
</body>
</html>
