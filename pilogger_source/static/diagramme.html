	<script>
	/**
	* @license
	* Copyright 2018,2024 G.Weiß-Engel (info@pilogger.de)
	* MIT-licensed (http://opensource.org/licenses/MIT)
	*/
	var mySidebar = document.getElementById("mySidebar");
	var overlayBg = document.getElementById("myOverlay");
	function sb_open() {
		if (mySidebar.style.display === 'block') {
			mySidebar.style.display = 'none';
			overlayBg.style.display = "none";
		} else {
			mySidebar.style.display = 'block';
			overlayBg.style.display = "block";
		}
	}
	function sb_close() {
		mySidebar.style.display = "none";
		overlayBg.style.display = "none";
	}
	var g_show = getURLParameter('show');
	var g_data = "/logdata/";
	var url_data = getURLParameter('data');
	if (url_data != '') {
		g_data += url_data;
	} else {
		g_data += 'showdata.csv';
	}
	var AvgVal = 1;
	var g = [];
	function drawgraph() {
		g = new Dygraph(
			document.getElementById("graph_div"),
			g_data, {
				axes:{y2:{labelsKMG2:true,drawGrid:true,independentTicks:true,gridLinePattern:[2,2]}},
				labelsKMG2:true,
				interactionModel: Dygraph.defaultInteractionModel,
				animatedZooms:false,
				delimiter:';',
				digitsAfterDecimal:2,
				rollPeriod:1,
				showRoller:false,
				strokeWidth:2,
				strokeBorderWidth:1,
				errorBars:false,
				connectSeparatedPoints:false,
				pointSize:3,
				highlightCircleSize:5,
				legend:'always',
				labelsSeparateLines:true,
				colors:['#000000','#CC0000','#2847C5','#EE1111','#000000','#000066','#2847C5','#EE1111','#000000','#004D4D','#2847C5','#EE1111','#000000','#FF6600','#2847C5','#EE1111','#000000','#CCCC00','#2847C5','#EE1111','#2847C5','#000000','#EE1111','#2847C5','#000000','#EE1111','#000000','#2847C5','#EE1111'],
				visibility:[false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false]
			}
		);
		g.ready ( function() {
			g_labels=g.getLabels();
			if(!localStorage.getItem('DiaGraphFill')) {StoreDefaultState()};
			SetStoredState();
			if (g_show == '') {
				SetStoredTraces();
			} else {
				switch (g_show) {
					case 'temp': setVis(1);break;
					case 'wind': setVis(5);break;
					case 'volt': setVis(9);break;
					case 'amps': setVis(13);break;
					case 'watt': setVis(17);break;
					case 'enerperm': setVis(20);setVis(21);setVis(22);break;
					case 'enerday': setVis(23);setVis(24);setVis(25);break;
					case 'windavg': setVis(26);setVis(27);setVis(28);break;
					default: setVis(1);
				}
			}
		});
	}
	function change(el) {
		reihe = parseInt(el.id);
		VisTraces = localStorage.getItem('DiaGraphTraces');
		TracesVis = Array.from(VisTraces);
		if (reihe < 30) {
			var reiheTag = g_labels[reihe+1];
			g.setVisibility(reihe,el.checked);
			if (el.checked) {
				g.updateOptions({series:{[reiheTag]:{axis:'y',strokePattern:null}}});
				document.getElementById(reihe+30).checked = false;
				TracesVis[reihe+30] = '_';
				TracesVis[reihe] = 'I';
			} else {
				TracesVis[reihe] = '_';
			}
		} else {
			reiheTag = g_labels[reihe-29];
			g.setVisibility(reihe-30,el.checked);
			if (el.checked) {
				g.updateOptions({series:{[reiheTag]:{axis:'y2',strokePattern:[2,1]}}});
				document.getElementById(reihe-30).checked = false;
				TracesVis[reihe-30] = '_';
				TracesVis[reihe] = 'I';
			} else {
				g.updateOptions({series:{[reiheTag]:{axis:'y',strokePattern:null}}});
				TracesVis[reihe] = '_';
			}
		}
		VisTraces = TracesVis.join('');
		if (g_show == '') {localStorage.setItem('DiaGraphTraces',(VisTraces))};
	}
	function changeFill(el) {
		g.updateOptions({fillGraph: (el.checked)});
		localStorage.setItem('DiaGraphFill', (el.checked));
	}
	function Set_AvgVal(uv) {
		ov = AvgVal;
		uv = uv.replace(/,/,".");
		AvgVal = parseInt(uv);
		if (AvgVal < 1 || AvgVal > 1000) {
			AvgVal = ov;
			document.getElementById("AvgInput").style.backgroundColor = "#ff4c4c";
		}else{
			document.getElementById("AvgInput").style.backgroundColor = "";
		};
		g.updateOptions({rollPeriod: AvgVal});
		document.getElementById('AvgInput').value = AvgVal;
		localStorage.setItem('DiaAvgVal', AvgVal);
	}
	function SetStoredState() {
		GFill = (localStorage.getItem('DiaGraphFill')==='true');
		document.getElementById('fill').checked = GFill;
		AvgVal = parseInt(localStorage.getItem('DiaAvgVal'));
		document.getElementById('AvgInput').value = AvgVal;
		g.updateOptions({fillGraph: GFill, rollPeriod: AvgVal});
	}
	function SetStoredTraces() {
		TracesVis = localStorage.getItem('DiaGraphTraces');
		for (let r=0;r<=28;r++) {
			if (TracesVis[r] == 'I') {
				var reiheTag = g_labels[r+1];
				g.updateOptions({series:{[reiheTag]:{axis:'y',strokePattern:null}}});
				g.setVisibility(r,true);
				document.getElementById(r).checked = true;
			}
		}
		for (let r=30;r<=58;r++) {
			if (TracesVis[r] == 'I') {
				var reiheTag = g_labels[r-29];
				g.updateOptions({series:{[reiheTag]:{axis:'y2',strokePattern:[2,1]}}});
				g.setVisibility(r-30,true);
				document.getElementById(r).checked = true;
			}
		}
	}
	function StoreDefaultState() {
		localStorage.setItem('DiaGraphFill', false);
		localStorage.setItem('DiaAvgVal', '1');
		localStorage.setItem('DiaGraphTraces', '_I_________________________________________________________');
	}
	function setVis(k) {
		g.setVisibility(parseInt(k),true);
		document.getElementById(k).checked = true;
	}
	function getURLParameter(name) {
		var value = decodeURIComponent((RegExp(name + '=' + '(.+?)(&|$|;)').exec(location.search) || [, ""])[1]);
		return (value !== 'null') ? value : false;
	}
	drawgraph();
	</script>
