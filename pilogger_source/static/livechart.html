	<script>

	var mySidebar = document.getElementById("mySidebar");
	var overlayBg = document.getElementById("myOverlay");
	function sb_open() {
		if (mySidebar.style.display === 'block') {
			mySidebar.style.display = 'none';
			overlayBg.style.display = "none";
		} else {
			mySidebar.style.display = 'block';
			overlayBg.style.display = "block";
		}
	}
	function sb_close() {
		mySidebar.style.display = "none";
		overlayBg.style.display = "none";
	}
	var data = [];
	var WindUnit = '';
	function get_windUnit() {
		var xhr = new XMLHttpRequest();
		xhr.open("GET","/getraspiconf/", false);
		xhr.onreadystatechange = function () {
			if (xhr.readyState === 4) {
				if (xhr.status === 200) {
					var res = JSON.parse(xhr.responseText);
					for (id in res) {
						if (id == "UnitPulse1") {
							WindUnit = res[id];
						};
					};
					} else {
						console.error(xhr.statusText);
						console.log("Error processing getraspiconf");
					}
				}
			};
			xhr.send();
		};
	get_windUnit();
	WindUnit1 = "Wind akt [" + WindUnit + "]";
	WindUnit2 = "Wind 10m [" + WindUnit + "]";
	WindUnit3 = "Wind 1h [" + WindUnit + "]";
	WindUnit4 = "Wind 1d [" + WindUnit + "]";
	var labelLine = ["Zeit","Temp [°C]",WindUnit1,WindUnit2,WindUnit3,WindUnit4,"Volt [V]","Amp [A]","Watt [W]","BilTg [Wh]","EtrTg [Wh]","VerTg [Wh]","Bila [Wh]","Ertr [Wh]","Verb [Wh]"];
	function requestData() {
		var newData = [];
		var xhr = new XMLHttpRequest();
		xhr.open("GET","/data/", true);
		xhr.onreadystatechange = function () {
			if (xhr.readyState === 4) {
				if (xhr.status === 200) {
					var res = JSON.parse(xhr.responseText);
					for (id in res) {if (id === 'PiLoTime')  {var teil = Date(res[id]);newData.push(new Date(teil))}};
					for (id in res) {if (id === 'PiLoTemp1') {var teil = res[id].replace(/,/,'.');newData.push(parseFloat(teil))}};
					for (id in res) {if (id === 'PiLoWind1') {var teil = res[id].replace(/,/,'.');newData.push(parseFloat(teil))}};
					for (id in res) {if (id === 'PiLoWind10m') {var teil = res[id].replace(/,/,'.');newData.push(parseFloat(teil))}};
					for (id in res) {if (id === 'PiLoWind1h') {var teil = res[id].replace(/,/,'.');newData.push(parseFloat(teil))}};
					for (id in res) {if (id === 'PiLoWind1d') {var teil = res[id].replace(/,/,'.');newData.push(parseFloat(teil))}};
					for (id in res) {if (id === 'PiLoVolt')  {var teil = res[id].replace(/,/,'.');newData.push(parseFloat(teil))}};
					for (id in res) {if (id === 'PiLoAmps')  {var teil = res[id].replace(/,/,'.');newData.push(parseFloat(teil))}};
					for (id in res) {if (id === 'PiLoWatt')  {var teil = res[id].replace(/,/,'.');newData.push(parseFloat(teil))}};
					for (id in res) {if (id === 'TgEner')   {var teil = res[id].replace(/,/,'.');newData.push(parseFloat(teil))}};
					for (id in res) {if (id === 'TgEnerE')   {var teil = res[id].replace(/,/,'.');newData.push(parseFloat(teil))}};
					for (id in res) {if (id === 'TgEnerV')    {var teil = res[id].replace(/,/,'.');newData.push(parseFloat(teil))}};
					for (id in res) {if (id === 'PiLoEner') {var teil = res[id].replace(/,/,'.');newData.push(parseFloat(teil))}};
					for (id in res) {if (id === 'PiLoEnerE') {var teil = res[id].replace(/,/,'.');newData.push(parseFloat(teil))}};
					for (id in res) {if (id === 'PiLoEnerV')  {var teil = res[id].replace(/,/,'.');newData.push(parseFloat(teil))}};
					for (id in res) {if (id === 'Fehler') {if (res[id] != "") {Zeigefehler(res[id])}}};
					data.push(newData);
				} else {
					console.error(xhr.statusText);
					console.log("Error processing requestData");
				}
			}
		};
		xhr.send();
	};

	var polltime = 5;
	var userTime = 5;
	var intervalTime = polltime * 1000;
	var g = [];
	function drawgraph() {
		g = new Dygraph(
			document.getElementById("graph_div"),data,
			{
				axes:{y2:{labelsKMG2:true,drawGrid:true,independentTicks:true,gridLinePattern:[2,2]}},
				labelsKMG2:true,
				interactionModel: Dygraph.defaultInteractionModel,
				animatedZooms:false,
				delimiter:';',
				digitsAfterDecimal:2,
				rollPeriod:1,
				showRoller:false,
				strokeWidth:2,
				strokeBorderWidth:1,
				errorBars:false,
				connectSeparatedPoints:false,
				pointSize:3,
				highlightCircleSize:5,
				legend:'always',
				labels:labelLine,
				labelsSeparateLines:true,
				fillGraph:true,
				colors:['#CC0000','#000000','#EE1111','#FF6600','#2847C5','#EE1111','#000066','#2847C5','#2847C5','#004D4D','#EE1111','#2847C5','#FF6600','#EE1111'],
				visibility:[false,false,false,false,false,false,false,false,false,false,false,false,false,false]
			}
		);
		g.ready ( function() {
			g_labels=g.getLabels();
			if(!localStorage.getItem('LiveGraphFill')) {StoreDefaultState()};
			SetStoredState();
			window.intervalId = setInterval(function() {
				requestData();
				setTimeout(() => {g.updateOptions( { 'file': data } );},700);
			}, intervalTime);
		});
	}
	function change(el) {
		reihe = parseInt(el.id);
		VisTraces = localStorage.getItem('LiveGraphTraces');
		TracesVis = Array.from(VisTraces);
		if (reihe < 20) {
			reiheTag = g_labels[reihe+1];
			g.setVisibility(reihe,el.checked);
			if (el.checked) {
				g.updateOptions({series:{[reiheTag]:{axis:'y',strokePattern:null}}});
				document.getElementById(reihe+20).checked = false;
				TracesVis[reihe+20] = '_';
				TracesVis[reihe] = 'I';
			} else {
				TracesVis[reihe] = '_';
			}
		} else {
			reiheTag = g_labels[reihe-19];
			g.setVisibility(reihe-20,el.checked);
			if (el.checked) {
				g.updateOptions({series:{[reiheTag]:{axis:'y2',strokePattern:[2,1]}}});
				document.getElementById(reihe-20).checked = false;
				TracesVis[reihe-20] = '_';
				TracesVis[reihe] = 'I';
			} else {
				g.updateOptions({series:{[reiheTag]:{axis:'y',strokePattern:null}}});
				TracesVis[reihe] = '_';
			}
		}
		VisTraces = TracesVis.join('');
		localStorage.setItem('LiveGraphTraces',(VisTraces));
	}
	function changeFill(el) {
		g.updateOptions({fillGraph: (el.checked)});
		localStorage.setItem('LiveGraphFill', (el.checked));
	}
	function Set_AvgVal(uv) {
		ov = AvgVal;
		uv = uv.replace(/,/,".");
		AvgVal = parseInt(uv);
		if (AvgVal < 1 || AvgVal > 1000) {
			AvgVal = ov;
			document.getElementById("AvgInput").style.backgroundColor = "#ff4c4c";
		}else{
			document.getElementById("AvgInput").style.backgroundColor = "";
		};
		g.updateOptions({rollPeriod: AvgVal});
		document.getElementById('AvgInput').value = AvgVal;
		localStorage.setItem('LiveAvgVal', AvgVal);
	}
	function SetStoredState() {
		GFill = (localStorage.getItem('LiveGraphFill')==='true');
		document.getElementById('fill').checked = GFill;
		AvgVal = parseInt(localStorage.getItem('LiveAvgVal'));
		document.getElementById('AvgInput').value = AvgVal;
		g.updateOptions({fillGraph: GFill, rollPeriod: AvgVal});
		polltime = parseFloat(localStorage.getItem('LivePollTime'));
		Set_Polltime(polltime);
		switch (polltime) {
			case 2 : document.getElementById('PollShort').checked = true; break;
			case 5 : document.getElementById('PollNormal').checked = true; break;
			default : document.getElementById('PollUser').checked = true;
		}
		TracesVis = localStorage.getItem('LiveGraphTraces');
		for (let r=0;r<=13;r++) {
			if (TracesVis[r] == 'I') {
				var reiheTag = g_labels[r+1];
				g.updateOptions({series:{[reiheTag]:{axis:'y',strokePattern:null}}});
				g.setVisibility(r,true);
				document.getElementById(r).checked = true;
			}
		}
		for (let r=20;r<=33;r++) {
			if (TracesVis[r] == 'I') {
				var reiheTag = g_labels[r-19];
				g.updateOptions({series:{[reiheTag]:{axis:'y2',strokePattern:[2,1]}}});
				g.setVisibility(r-20,true);
				document.getElementById(r).checked = true;
			}
		}
	}
	function StoreDefaultState() {
		localStorage.setItem('LiveGraphFill', false);
		localStorage.setItem('LiveAvgVal', '1');
		localStorage.setItem('LivePollTime', '5');
		localStorage.setItem('LiveGraphTraces', 'I________________________________');
	}
	function Set_Polltime(tv) {
		if (tv <= 120 && tv >= 1) {
			polltime = tv;
			intervalTime = tv*1000;
			document.getElementById('PollTime').value = polltime;
			localStorage.setItem('LivePollTime', polltime);
			clearInterval(window.intervalId);
			window.intervalId = setInterval(function() {
				requestData();
				setTimeout(() => {g.updateOptions( { 'file': data } );},700);
			}, intervalTime);
		}
	}
	function Set_Usertime(uv) {
		ov = userTime;
		uv = uv.replace(/,/,".");
		userTime = parseFloat(uv);
		if (userTime < 1 || userTime > 120) {
			userTime = ov;
			document.getElementById("PollTime").style.backgroundColor = "#ff4c4c";
		}else{
			document.getElementById("PollTime").style.backgroundColor = "";
		};
		document.getElementById('PollUser').checked = true;
		Set_Polltime(userTime);
	}
	document.getElementById('PollTime').value = polltime;
	clearTimeout();
	requestData();
	setTimeout(() => {drawgraph();},700);
	</script>
